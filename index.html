<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posts</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #1a1a1a;
      --text-secondary: #555;
      --text-muted: #888;
      --bg: #faf9f7;
      --accent: #c45d2c;
      --border: #e5e2dd;
      --serif: 'Source Serif 4', Georgia, serif;
      --sans: 'Inter', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--serif);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 64px 24px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Profile header */
    .profile-header {
      padding: 0 0 40px;
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
    }

    .profile-name {
      font-size: 1.6rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .profile-title {
      font-family: var(--sans);
      font-size: 14px;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .profile-location {
      font-family: var(--sans);
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .profile-links {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-family: var(--sans);
      font-size: 13px;
    }

    .profile-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
      margin-bottom: 0;
      display: inline;
      transition: color 0.15s;
    }
    .profile-links a:hover { color: var(--accent); }

    h1 {
      font-size: 13px;
      font-family: var(--sans);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    ul {
      list-style: none;
    }

    li {
      border-top: 1px solid var(--border);
      padding: 24px 0;
    }

    li:last-child {
      border-bottom: 1px solid var(--border);
    }

    a {
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.4;
      color: var(--text);
      text-decoration: none;
      transition: color 0.15s;
      display: block;
      margin-bottom: 8px;
    }

    a:hover {
      color: var(--accent);
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--sans);
      font-size: 12px;
      color: var(--text-muted);
    }

    .category {
      background: #eeece8;
      color: var(--text-secondary);
      padding: 2px 8px;
      border-radius: 3px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .error {
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text-muted);
    }
  </style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WND1ZWTYSM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WND1ZWTYSM');
  </script>
</head>
<body>
  <div class="container">
    <div class="profile-header">
      <div class="profile-name">Abraham Swamidass</div>
      <div class="profile-title">Sr. Staff Engineer — InteLogix · Cardinal Health</div>
      <div class="profile-location">Columbus, Ohio</div>
      <div class="profile-links">
        <a href="portfolio/profile.html">Profile &amp; Portfolio</a>
        <a href="https://www.linkedin.com/in/abraham-swamidass-758a023b/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="mailto:winfredbe@gmail.com">winfredbe@gmail.com</a>
      </div>
    </div>
    <h1>Posts</h1>
    <ul id="list"></ul>
  </div>

  <script type="application/json" id="posts-data">
[
  {
    "file": "learning/picarx_architecture.html",
    "title": "PiCar-X System Architecture — Learning",
    "date": "2026-04-01",
    "category": "Learning"
  },
  {
    "file": "learning/pi-robot-car-build.html",
    "title": "Building a Raspberry Pi Robot Car — Notes from the Workbench",
    "date": "2026-03-28",
    "category": "Learning"
  },
  {
    "file": "portfolio/profile.html",
    "title": "Abraham Swamidass — Profile",
    "date": "2026-03-24",
    "category": "Portfolio"
  },
  {
    "file": "science/sea-rise.html",
    "title": "From the Seafloor to the Sky — How a Pin in the Laccadive Sea Reveals Earth's Climate Story",
    "date": "2026-03-24",
    "category": "Science"
  }
]
</script>

  <script>
    (function () {
      const posts = JSON.parse(document.getElementById('posts-data').textContent);
      const ul = document.getElementById('list');
      if (!posts.length) {
        ul.innerHTML = '<li class="error">No posts yet.</li>';
        return;
      }
      ul.innerHTML = posts.filter(p => p.category !== 'Portfolio').map(p => {
        const date = p.date
          ? new Date(p.date + 'T00:00:00Z').toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', timeZone: 'UTC' })
          : '';
        const category = p.category
          ? `<span class="category">${p.category}</span>`
          : '';
        const meta = (date || category)
          ? `<div class="meta">${date ? `<span>${date}</span>` : ''}${category}</div>`
          : '';
        return `<li><a href="${p.file}">${p.title}</a>${meta}</li>`;
      }).join('');
    })();
  </script>
</body>
</html>
