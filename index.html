<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posts</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #1a1a1a;
      --text-secondary: #555;
      --text-muted: #888;
      --bg: #faf9f7;
      --accent: #c45d2c;
      --border: #e5e2dd;
      --serif: 'Source Serif 4', Georgia, serif;
      --sans: 'Inter', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--serif);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 64px 24px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      font-size: 13px;
      font-family: var(--sans);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 48px;
    }

    ul {
      list-style: none;
    }

    li {
      border-top: 1px solid var(--border);
      padding: 24px 0;
    }

    li:last-child {
      border-bottom: 1px solid var(--border);
    }

    a {
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.4;
      color: var(--text);
      text-decoration: none;
      transition: color 0.15s;
      display: block;
      margin-bottom: 8px;
    }

    a:hover {
      color: var(--accent);
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--sans);
      font-size: 12px;
      color: var(--text-muted);
    }

    .category {
      background: #eeece8;
      color: var(--text-secondary);
      padding: 2px 8px;
      border-radius: 3px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .error {
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text-muted);
    }
  </style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WND1ZWTYSM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WND1ZWTYSM');
  </script>
</head>
<body>
  <div class="container">
    <h1>Posts</h1>
    <ul id="list"></ul>
  </div>

  <script>
    fetch('posts.json')
      .then(r => r.json())
      .then(posts => {
        const ul = document.getElementById('list');
        if (!posts.length) {
          ul.innerHTML = '<li class="error">No posts yet.</li>';
          return;
        }
        ul.innerHTML = posts.map(p => {
          const date = p.date
            ? new Date(p.date + 'T00:00:00Z').toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', timeZone: 'UTC' })
            : '';
          const category = p.category
            ? `<span class="category">${p.category}</span>`
            : '';
          const meta = (date || category)
            ? `<div class="meta">${date ? `<span>${date}</span>` : ''}${category}</div>`
            : '';
          return `<li><a href="${p.file}">${p.title}</a>${meta}</li>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('list').innerHTML =
          '<li class="error">Could not load posts.</li>';
      });
  </script>
</body>
</html>
